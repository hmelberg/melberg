<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Melberg Projects</title>
  <meta name="description" content="Overview of projects hosted at *.melberg.app" />
  <style>
    :root {
      --bg-1: #f7efe6;
      --bg-2: #e5d4c2;
      --ink: #1f1913;
      --muted: #66584a;
      --line: #d7c4af;
      --card: #fffdf9;
      --accent: #a03c11;
      --accent-2: #6d2408;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(1200px 800px at 10% -10%, #fff7ef 0%, transparent 62%),
                  linear-gradient(150deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 18px 64px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .lede {
      margin: 0;
      color: var(--muted);
      max-width: 72ch;
    }

    .meta {
      margin: 14px 0 24px;
      color: var(--muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 0.95rem;
    }

    .meta button,
    .meta a {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 14px;
      text-decoration: none;
      cursor: pointer;
      font-size: 0.92rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: var(--card);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
      opacity: 0;
      transform: translateY(10px);
      animation: in 500ms ease forwards;
    }

    .card:nth-child(2) { animation-delay: 70ms; }
    .card:nth-child(3) { animation-delay: 140ms; }
    .card:nth-child(4) { animation-delay: 210ms; }
    .card:nth-child(5) { animation-delay: 280ms; }

    .card h2 {
      margin: 0 0 6px;
      font-size: 1.1rem;
      line-height: 1.2;
    }

    .badges {
      margin: 0 0 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 3px 8px;
      color: var(--muted);
      background: #fff;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .badge.featured {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, #c44d14, #7c2909);
    }

    .card.featured {
      border-color: #c98b66;
      box-shadow: 0 10px 28px rgba(156, 68, 28, 0.2);
    }

    .host {
      margin: 0 0 10px;
      color: var(--muted);
      font-family: Consolas, Menlo, monospace;
      font-size: 0.88rem;
      word-break: break-word;
    }

    .desc {
      margin: 0 0 12px;
      line-height: 1.45;
      min-height: 2.5em;
    }

    .card a {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 600;
      font-size: 0.93rem;
    }

    .status {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @keyframes in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>melberg.app projects</h1>
    <p class="lede">Auto-updated overview from GitHub repositories for hmelberg, with exclusions and overrides from a config file.</p>
    <div class="meta">
      <span id="summary">Loading projects...</span>
      <button id="refreshButton" type="button">Refresh now</button>
      <a href="admin.html">Admin</a>
    </div>
    <section id="projectGrid" class="grid"></section>
    <p id="status" class="status"></p>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
